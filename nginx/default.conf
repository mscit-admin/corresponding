# GSDMS reverse proxy — serves frontend and API behind a single port (8096)
server {
    listen 8096;
    server_name _;

    # Allow attachment/scanner uploads (backend limit is 20 MB)
    client_max_body_size 25m;

    # API and Swagger docs → NestJS backend (keeps the /api prefix)
    location /api/ {
        proxy_pass http://backend:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
